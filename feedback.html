<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback — Gym Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="nav-brand">
            <img src="img/logo.png" alt="Logo">
            <span class="nav-brand-name">Gym<span>Hub</span></span>
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="information.html">Information</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="feedback.html">Feedback</a></li>
            </ul>
        </nav>
        <div class="nav-footer">
            <a href="login.html">Sign In</a>
        </div>
    </header>
    <main>
        <div class="page-title">
            <h1>Share Your <em>Feedback</em></h1>
            <p class="subtitle">Help us improve your experience</p>
        </div>
        <div class="container">
            <form>
                <fieldset>
                    <legend>Your Experience</legend>
                    <div class="form-group">
                        <label class="label-block" for="rating">Overall Rating</label>
                        <select id="rating">
                            <option value="">Select a rating</option>
                            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                            <option value="4">⭐⭐⭐⭐ Good</option>
                            <option value="3">⭐⭐⭐ Average</option>
                            <option value="2">⭐⭐ Poor</option>
                            <option value="1">⭐ Very Poor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="label-block" for="comments">Comments</label>
                        <textarea id="comments" rows="5" placeholder="Tell us about your experience..."></textarea>
                    </div>
                </fieldset>
                <button type="submit" class="button">Submit Feedback</button>
            </form>
        </div>
    </main>
    <footer></footer>
</body>
</html>
