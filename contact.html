<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Gym Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="nav-brand">
            <img src="img/sampleLogo.png" alt="Logo">
            <span class="nav-brand-name">Gym<span>Hub</span></span>
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="information.html">Information</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="feedback.html">Feedback</a></li>
            </ul>
        </nav>
        <div class="nav-footer">
            <a href="login.html">Sign In</a>
        </div>
    </header>
    <main>
        <div class="page-title">
            <h1>Get In <em>Touch</em></h1>
            <p class="subtitle">Reach out with any questions or inquiries</p>
        </div>
        <article class="container">
            <h1>Contact Us</h1>
            <form>
                <fieldset>
                    <legend>Your Details</legend>
                    <div class="form-group">
                        <label class="label-block" for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="label-block" for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label class="label-block" for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="How can we help you?"></textarea>
                    </div>
                </fieldset>
                <button type="submit" class="button">Send Message</button>
            </form>
        </article>
    </main>
    <footer></footer>
</body>
</html>
