<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Gym Hub</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <header>

    </header>
    <main>
        <article class="container">
            <h1>Login</h1>
            <form action="index.html">
                <fieldset>
                    <legend>Account Details</legend>
                    <div class="form-group">
                        <label class="label-block" for="Username">Username</label>
                        <input type="email" name="username" id="username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="Password" class="label-block">Password</label>
                        <input type="password" name="password" id="password" placeholder="***********" required>
                    </div>
                </fieldset>
                <button type="submit" class="button">Sign up</button>
            </form>
        </article>
    </main>
    <footer>
        
    </footer>
</body>
</html>
