<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Gym Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="login-wrap">

            <div class="text-center mb-4">
                <a href="index.html" class="login-brand">
                    <img src="img/logo.png" alt="Logo">
                    <span class="login-brand-name">Gym<span>Hub</span></span>
                </a>
            </div>

            <div class="card login-card">
                <div class="card-body p-4">
                    <h1 class="login-heading mb-4">Sign In</h1>
                    <form action="index.html">
                        <fieldset class="mb-3">
                            <legend>Account Details</legend>
                            <div class="mb-3">
                                <label for="username" class="form-label label-block">Email</label>
                                <input type="email" class="form-control login-input" id="username" name="username" placeholder="you@example.com" required>
                            </div>
                            <div class="mb-1">
                                <label for="password" class="form-label label-block">Password</label>
                                <input type="password" class="form-control login-input" id="password" name="password" placeholder="••••••••••" required>
                            </div>
                        </fieldset>
                        <div class="d-grid mt-3">
                            <button type="submit" class="btn login-btn">Sign In</button>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center mt-3 login-back">
                Don't have an account? <a href="index.html">Browse as guest</a>
            </p>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
